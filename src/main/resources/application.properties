spring.application.name=taskflow-api
server.port=8080

# Database Connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate / Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=public

# JWT Security
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# File Uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Caching
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=300s

# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/api-docs/swagger-config
springdoc.swagger-ui.url=/api-docs
springdoc.swagger-ui.tags-sorter=alpha

# Threading & Server
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
server.forward-headers-strategy=framework
ssl.enable=true

# Mail
app.resend.api-key=${RESEND_API_KEY}
app.mail.from=no-reply@univaciti.com
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App Config
app.base-url=${FRONTEND_BASE_URL}
# CORS ? allow frontend origins
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://task-flow-rho-liart.vercel.app
spring.jackson.mapper.accept-case-insensitive-enums=true
# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}